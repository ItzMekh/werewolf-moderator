services:
  - type: web
    name: werewolf-server
    runtime: node
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://client-psi-lilac-81.vercel.app
      - key: MONGODB_URI
        sync: false
